name: ai_planner_mobile
description: AI Planner mobile client for Android and iOS.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.1.1
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  share_plus: ^7.2.1
  intl: ^0.19.0
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/vectors/
    - assets/backgrounds/
    - assets/fonts/
  fonts:
    - family: Steppe
      fonts:
        - asset: assets/fonts/Steppe-Light.ttf
          weight: 300
        - asset: assets/fonts/Steppe-Book.ttf
          weight: 400
        - asset: assets/fonts/Steppe-Regular.ttf
          weight: 500
